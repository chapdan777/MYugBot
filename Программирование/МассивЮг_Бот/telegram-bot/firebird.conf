# Firebird Configuration для совместимости с node-firebird
# Отключаем требование шифрования (node-firebird не поддерживает WireCrypt)

# Уровень шифрования: Enabled (разрешено, но не обязательно)
WireCrypt = Enabled

# Альтернативно можно попробовать:
# WireCrypt = Disabled

# Разрешить соединения от клиентов без шифрования
AuthServer = Legacy_Auth, Srp, Win_Sspi
AuthClient = Legacy_Auth, Srp, Win_Sspi

# Размер кэша страниц (по умолчанию)
DefaultDbCachePages = 2048
